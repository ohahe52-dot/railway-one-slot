<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gateway Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-zinc-950 text-zinc-100">
    <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-6 px-4 py-5 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-3 border-b border-zinc-800 pb-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p class="text-xs font-semibold uppercase text-emerald-400">Rust Reverse Proxy</p>
          <h1 class="mt-2 text-2xl font-semibold text-white">Gateway Dashboard</h1>
        </div>
        <div class="flex flex-wrap items-center gap-3 text-sm text-zinc-300">
          <span id="sse-dot" class="h-2.5 w-2.5 rounded-full bg-zinc-500"></span>
          <span id="sse-label">Connecting</span>
          <input
            id="admin-token-input"
            class="h-9 w-40 rounded-md border border-zinc-700 bg-zinc-900 px-3 text-sm text-zinc-100 outline-none focus:border-emerald-500"
            type="password"
            placeholder="Admin token"
            autocomplete="off"
          />
          <button
            id="refresh-btn"
            class="inline-flex h-9 items-center gap-2 rounded-md border border-zinc-700 bg-zinc-900 px-3 text-sm font-medium text-zinc-100 hover:bg-zinc-800"
            type="button"
            title="Refresh"
          >
            <span aria-hidden="true">R</span>
            <span>Refresh</span>
          </button>
        </div>
      </header>

      <section class="grid gap-6 lg:grid-cols-[minmax(0,1fr)_420px]">
        <div class="min-w-0">
          <div class="mb-3 flex items-center justify-between gap-3">
            <h2 class="text-base font-semibold text-white">Account Pool</h2>
            <div class="flex items-center gap-3 text-xs text-zinc-400">
              <span class="inline-flex items-center gap-1.5"><span class="h-2 w-2 rounded-full bg-emerald-500"></span>Idle</span>
              <span class="inline-flex items-center gap-1.5"><span class="h-2 w-2 rounded-full bg-amber-500"></span>Busy</span>
              <span class="inline-flex items-center gap-1.5"><span class="h-2 w-2 rounded-full bg-red-500"></span>Error</span>
            </div>
          </div>
          <div id="account-grid" class="grid grid-cols-2 gap-3 sm:grid-cols-4"></div>
        </div>

        <aside class="flex min-w-0 flex-col gap-6">
          <section class="rounded-md border border-zinc-800 bg-zinc-950 p-3">
            <div class="mb-3 flex items-center justify-between gap-3">
              <h2 class="text-base font-semibold text-white">Account Import</h2>
              <span id="account-import-status" class="text-xs text-zinc-500"></span>
            </div>
            <textarea
              id="account-import"
              class="min-h-24 w-full resize-y rounded-md border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100 outline-none focus:border-emerald-500"
              placeholder="email|password"
              spellcheck="false"
            ></textarea>
            <div class="mt-3 flex justify-end">
              <button
                id="account-import-submit"
                class="h-9 rounded-md border border-emerald-700 bg-emerald-950 px-3 text-sm font-medium text-emerald-200 hover:bg-emerald-900"
                type="button"
              >
                Import
              </button>
            </div>
          </section>

          <section>
            <div class="mb-3 flex items-center justify-between gap-3">
              <h2 class="text-base font-semibold text-white">Cache Monitor</h2>
              <span id="cache-count" class="rounded-md bg-zinc-900 px-2 py-1 text-xs text-zinc-300">0 keys</span>
            </div>
            <div class="overflow-hidden rounded-md border border-zinc-800 bg-zinc-950">
              <div class="grid grid-cols-[1fr_128px_44px] border-b border-zinc-800 bg-zinc-900/70 px-3 py-2 text-xs font-semibold uppercase text-zinc-400">
                <span>Sha256 key</span>
                <span>Created</span>
                <span></span>
              </div>
              <div id="cache-list" class="max-h-[300px] overflow-y-auto"></div>
            </div>
          </section>

          <section>
            <div class="mb-3 flex items-center justify-between gap-3">
              <h2 class="text-base font-semibold text-white">API Keys</h2>
              <span id="api-key-count" class="rounded-md bg-zinc-900 px-2 py-1 text-xs text-zinc-300">0 keys</span>
            </div>
            <div class="rounded-md border border-zinc-800 bg-zinc-950 p-3">
              <div class="flex gap-2">
                <input
                  id="api-key-name"
                  class="h-9 min-w-0 flex-1 rounded-md border border-zinc-700 bg-zinc-900 px-3 text-sm text-zinc-100 outline-none focus:border-emerald-500"
                  type="text"
                  placeholder="Key name"
                />
                <button
                  id="api-key-create"
                  class="h-9 rounded-md border border-emerald-700 bg-emerald-950 px-3 text-sm font-medium text-emerald-200 hover:bg-emerald-900"
                  type="button"
                >
                  Create
                </button>
              </div>
              <code id="new-api-key" class="mt-3 hidden break-all rounded-md border border-emerald-800 bg-emerald-950/40 p-3 text-xs text-emerald-200"></code>
              <div id="api-key-list" class="mt-3 max-h-[260px] overflow-y-auto rounded-md border border-zinc-900"></div>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <template id="account-slot-template">
      <div class="rounded-md border p-3 shadow-sm">
        <div class="flex h-full min-h-[104px] flex-col justify-between gap-3">
          <div class="min-w-0">
            <p class="slot-name text-sm font-semibold"></p>
            <p class="slot-meta mt-1 text-xs"></p>
          </div>
          <div class="flex items-center justify-between gap-2">
            <span class="slot-state self-start rounded px-2 py-1 text-xs font-semibold uppercase"></span>
            <button
              class="account-delete hidden h-8 w-8 items-center justify-center rounded-md border border-zinc-700 bg-zinc-900 text-zinc-200 hover:border-red-500 hover:text-red-300"
              type="button"
              title="Delete account"
            >
              <span aria-hidden="true">x</span>
            </button>
          </div>
        </div>
      </div>
    </template>

    <template id="cache-row-template">
      <div class="grid grid-cols-[1fr_128px_44px] items-center gap-2 border-b border-zinc-900 px-3 py-2 last:border-b-0">
        <code class="cache-key min-w-0 truncate text-xs text-zinc-300"></code>
        <span class="cache-created text-xs text-zinc-400"></span>
        <button
          class="cache-delete inline-flex h-8 w-8 items-center justify-center rounded-md border border-zinc-700 bg-zinc-900 text-zinc-200 hover:border-red-500 hover:text-red-300"
          type="button"
          title="Delete cache key"
        >
          <span aria-hidden="true">x</span>
        </button>
      </div>
    </template>

    <template id="api-key-row-template">
      <div class="grid grid-cols-[1fr_86px_44px] items-center gap-2 border-b border-zinc-900 px-3 py-2 last:border-b-0">
        <div class="min-w-0">
          <p class="api-key-name truncate text-sm font-medium text-zinc-200"></p>
          <code class="api-key-prefix text-xs text-zinc-500"></code>
        </div>
        <span class="api-key-created text-xs text-zinc-400"></span>
        <button
          class="api-key-delete inline-flex h-8 w-8 items-center justify-center rounded-md border border-zinc-700 bg-zinc-900 text-zinc-200 hover:border-red-500 hover:text-red-300"
          type="button"
          title="Delete API key"
        >
          <span aria-hidden="true">x</span>
        </button>
      </div>
    </template>

    <script>
      const accountGrid = document.getElementById("account-grid");
      const accountTemplate = document.getElementById("account-slot-template");
      const cacheList = document.getElementById("cache-list");
      const cacheTemplate = document.getElementById("cache-row-template");
      const cacheCount = document.getElementById("cache-count");
      const sseDot = document.getElementById("sse-dot");
      const sseLabel = document.getElementById("sse-label");
      const refreshBtn = document.getElementById("refresh-btn");
      const accountImport = document.getElementById("account-import");
      const accountImportSubmit = document.getElementById("account-import-submit");
      const accountImportStatus = document.getElementById("account-import-status");
      const adminTokenInput = document.getElementById("admin-token-input");
      const apiKeyCount = document.getElementById("api-key-count");
      const apiKeyName = document.getElementById("api-key-name");
      const apiKeyCreate = document.getElementById("api-key-create");
      const apiKeyList = document.getElementById("api-key-list");
      const apiKeyTemplate = document.getElementById("api-key-row-template");
      const newApiKey = document.getElementById("new-api-key");
      let adminToken = localStorage.getItem("gateway_admin_token") || "";
      let eventSource = null;

      adminTokenInput.value = adminToken;

      const stateStyles = {
        idle: {
          card: "border-emerald-800/70 bg-emerald-950/30",
          label: "bg-emerald-500/15 text-emerald-300",
          meta: "text-emerald-200/70",
        },
        busy: {
          card: "border-amber-800/70 bg-amber-950/30",
          label: "bg-amber-500/15 text-amber-300",
          meta: "text-amber-200/70",
        },
        error: {
          card: "border-red-800/70 bg-red-950/30",
          label: "bg-red-500/15 text-red-300",
          meta: "text-red-200/70",
        },
        empty: {
          card: "border-zinc-800 bg-zinc-900/40",
          label: "bg-zinc-800 text-zinc-400",
          meta: "text-zinc-500",
        },
      };

      function adminHeaders(extra = {}) {
        return adminToken ? { ...extra, "x-admin-token": adminToken } : extra;
      }

      function adminEventUrl() {
        if (!adminToken) return "/api/admin/events";
        return `/api/admin/events?admin_token=${encodeURIComponent(adminToken)}`;
      }

      async function adminFetch(path, options = {}) {
        const headers = adminHeaders(options.headers || {});
        const response = await fetch(path, { ...options, headers, cache: "no-store" });
        if (response.status === 401) {
          sseDot.className = "h-2.5 w-2.5 rounded-full bg-red-500";
          sseLabel.textContent = "Admin token";
          throw new Error("admin token required");
        }
        return response;
      }

      function normalizeAccounts(payload) {
        if (Array.isArray(payload)) return payload;
        if (payload && Array.isArray(payload.accounts)) return payload.accounts;
        return [];
      }

      function renderAccounts(payload) {
        const accounts = normalizeAccounts(payload);
        accountGrid.replaceChildren();

        for (let i = 0; i < 16; i += 1) {
          const account = accounts[i];
          const status = String(account?.state || account?.status || "empty").toLowerCase();
          const styles = stateStyles[status] || stateStyles.empty;
          const node = accountTemplate.content.firstElementChild.cloneNode(true);

          node.className = `rounded-md border p-3 shadow-sm ${styles.card}`;
          node.querySelector(".slot-name").textContent = account?.label || `Slot ${String(i + 1).padStart(2, "0")}`;
          node.querySelector(".slot-meta").textContent =
            account?.busy_for_seconds != null ? `${account.busy_for_seconds}s active` : account ? "Ready" : "No account";
          node.querySelector(".slot-meta").className = `slot-meta mt-1 text-xs ${styles.meta}`;
          node.querySelector(".slot-state").textContent = status;
          node.querySelector(".slot-state").className = `slot-state self-start rounded px-2 py-1 text-xs font-semibold uppercase ${styles.label}`;
          const deleteButton = node.querySelector(".account-delete");
          if (account) {
            deleteButton.classList.remove("hidden");
            deleteButton.classList.add("inline-flex");
            deleteButton.addEventListener("click", async () => {
              await adminFetch(`/api/admin/accounts/${encodeURIComponent(account.index)}`, { method: "DELETE" });
              await loadAccounts();
            });
          }
          accountGrid.appendChild(node);
        }
      }

      function renderCache(entries) {
        const items = Array.isArray(entries) ? entries : [];
        cacheCount.textContent = `${items.length} ${items.length === 1 ? "key" : "keys"}`;
        cacheList.replaceChildren();

        if (items.length === 0) {
          const empty = document.createElement("div");
          empty.className = "px-3 py-8 text-center text-sm text-zinc-500";
          empty.textContent = "No active cache";
          cacheList.appendChild(empty);
          return;
        }

        for (const item of items) {
          const node = cacheTemplate.content.firstElementChild.cloneNode(true);
          node.querySelector(".cache-key").textContent = item.key;
          node.querySelector(".cache-key").title = item.key;
          node.querySelector(".cache-created").textContent = formatTime(item.created_at_unix);
          node.querySelector(".cache-delete").addEventListener("click", async () => {
            await adminFetch(`/api/admin/cache/${encodeURIComponent(item.key)}`, { method: "DELETE" });
            await loadCache();
          });
          cacheList.appendChild(node);
        }
      }

      function renderApiKeys(entries) {
        const items = Array.isArray(entries) ? entries : [];
        apiKeyCount.textContent = `${items.length} ${items.length === 1 ? "key" : "keys"}`;
        apiKeyList.replaceChildren();

        if (items.length === 0) {
          const empty = document.createElement("div");
          empty.className = "px-3 py-6 text-center text-sm text-zinc-500";
          empty.textContent = "No API keys";
          apiKeyList.appendChild(empty);
          return;
        }

        for (const item of items) {
          const node = apiKeyTemplate.content.firstElementChild.cloneNode(true);
          node.querySelector(".api-key-name").textContent = item.name || "API key";
          node.querySelector(".api-key-prefix").textContent = item.prefix;
          node.querySelector(".api-key-created").textContent = formatTime(item.created_at_unix);
          node.querySelector(".api-key-delete").addEventListener("click", async () => {
            await adminFetch(`/api/admin/api-keys/${encodeURIComponent(item.id)}`, { method: "DELETE" });
            await loadApiKeys();
          });
          apiKeyList.appendChild(node);
        }
      }

      function formatTime(unixSeconds) {
        if (!unixSeconds) return "-";
        return new Date(unixSeconds * 1000).toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      async function loadAccounts() {
        const response = await adminFetch("/api/admin/accounts");
        renderAccounts(await response.json());
      }

      async function loadCache() {
        const response = await adminFetch("/api/admin/cache");
        renderCache(await response.json());
      }

      async function loadApiKeys() {
        const response = await adminFetch("/api/admin/api-keys");
        renderApiKeys(await response.json());
      }

      async function createApiKey() {
        const response = await adminFetch("/api/admin/api-keys", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name: apiKeyName.value.trim() }),
        });
        const payload = await response.json();
        newApiKey.textContent = payload.key;
        newApiKey.classList.remove("hidden");
        apiKeyName.value = "";
        await loadApiKeys();
      }

      async function importAccounts() {
        const accounts = accountImport.value.trim();
        if (!accounts) return;

        accountImportStatus.textContent = "Importing";
        const response = await adminFetch("/api/admin/accounts", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ accounts }),
        });
        const payload = await response.json();
        accountImport.value = "";
        accountImportStatus.textContent = `Added ${payload.added}, total ${payload.total}`;
        await loadAccounts();
      }

      async function refreshAll() {
        await Promise.allSettled([loadAccounts(), loadCache(), loadApiKeys()]);
      }

      refreshBtn.addEventListener("click", refreshAll);
      accountImportSubmit.addEventListener("click", importAccounts);
      apiKeyCreate.addEventListener("click", createApiKey);
      adminTokenInput.addEventListener("change", () => {
        adminToken = adminTokenInput.value.trim();
        localStorage.setItem("gateway_admin_token", adminToken);
        connectEvents();
        refreshAll();
      });

      function connectEvents() {
        if (eventSource) eventSource.close();
        eventSource = new EventSource(adminEventUrl());

        eventSource.onopen = () => {
          sseDot.className = "h-2.5 w-2.5 rounded-full bg-emerald-500";
          sseLabel.textContent = "Live";
        };

        eventSource.onerror = () => {
          sseDot.className = "h-2.5 w-2.5 rounded-full bg-red-500";
          sseLabel.textContent = "Reconnecting";
        };

        eventSource.addEventListener("state", (event) => {
          const payload = JSON.parse(event.data);
          renderAccounts(payload.accounts);
          renderCache(payload.cache);
          renderApiKeys(payload.api_keys);
        });
      }

      renderAccounts([]);
      renderCache([]);
      renderApiKeys([]);
      refreshAll();
      connectEvents();
    </script>
  </body>
</html>
